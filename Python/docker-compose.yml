version: '3.8'

services:
  # AI Service
  ai-service:
    build: .
    container_name: mental-health-ai
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=redis://redis:6379/0
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./models_cache:/app/models_cache
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
      - chromadb
    restart: unless-stopped
    networks:
      - mental-health-net

  # Redis
  redis:
    image: redis:7-alpine
    container_name: mental-health-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - mental-health-net

  # ChromaDB (Vector Database)
  chromadb:
    image: chromadb/chroma:latest
    container_name: mental-health-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped
    networks:
      - mental-health-net

volumes:
  redis_data:
  chroma_data:

networks:
  mental-health-net:
    driver: bridge